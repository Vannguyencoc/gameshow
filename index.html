<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuomiVerbi — Finnish Verb Mastery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #222233;
    --border: #2a2a3d;
    --text: #e8e8f0;
    --text2: #9999b3;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --green-bg: #22c55e18;
    --red: #ef4444;
    --red-bg: #ef444418;
    --orange: #f59e0b;
    --orange-bg: #f59e0b18;
    --blue: #3b82f6;
    --blue-bg: #3b82f618;
    --purple: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === LAYOUT === */
  .app { max-width: 520px; margin: 0 auto; padding: 16px; min-height: 100vh; position: relative; }

  /* === HEADER === */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; margin-bottom: 16px;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent2); }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
  }
  .streak-badge .fire { font-size: 16px; }

  /* === STATS BAR === */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; text-align: center;
  }
  .stat-card .num { font-size: 22px; font-weight: 800; }
  .stat-card .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat-card.new .num { color: var(--blue); }
  .stat-card.learning .num { color: var(--orange); }
  .stat-card.review .num { color: var(--green); }
  .stat-card.mastered .num { color: var(--purple); }

  /* === PROGRESS === */
  .progress-section { margin-bottom: 16px; }
  .progress-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; display: flex; }
  .progress-bar .seg { height: 100%; transition: width 0.5s ease; }
  .progress-bar .seg.mastered { background: var(--purple); }
  .progress-bar .seg.review { background: var(--green); }
  .progress-bar .seg.learning { background: var(--orange); }

  /* === NAV TABS === */
  .nav-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: var(--surface); border-radius: 12px; padding: 4px;
  }
  .nav-tab {
    flex: 1; padding: 10px 4px; border: none; background: none;
    color: var(--text2); font-size: 12px; font-weight: 600;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .nav-tab.active { background: var(--accent); color: white; }
  .nav-tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* === CARD === */
  .card-container {
    perspective: 1000px; margin-bottom: 16px; min-height: 320px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .card {
    position: relative; width: 100%; min-height: 320px;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; top: 0; left: 0; width: 100%; min-height: 320px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 20px; padding: 28px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }
  .card-front {
    background: linear-gradient(145deg, var(--surface), var(--surface2));
    border: 1px solid var(--border);
  }
  .card-back {
    background: linear-gradient(145deg, #1a1a30, #15152a);
    border: 1px solid var(--accent);
    transform: rotateY(180deg);
  }
  .type-badge {
    position: absolute; top: 16px; left: 16px;
    background: var(--accent); color: white;
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 700;
  }
  .srs-badge {
    position: absolute; top: 16px; right: 16px;
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
  }
  .srs-new { background: var(--blue-bg); color: var(--blue); }
  .srs-learning { background: var(--orange-bg); color: var(--orange); }
  .srs-review { background: var(--green-bg); color: var(--green); }
  .verb-word { font-size: 36px; font-weight: 900; margin-bottom: 8px; letter-spacing: -1px; text-align: center; }
  .verb-english { font-size: 18px; color: var(--text2); margin-bottom: 16px; font-weight: 500; text-align: center; }
  .tap-hint { font-size: 12px; color: var(--text2); opacity: 0.5; position: absolute; bottom: 16px; }
  .example-box {
    background: var(--surface); border-radius: 12px; padding: 16px;
    width: 100%; margin-top: 8px; border-left: 3px solid var(--accent);
  }
  .example-fi { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
  .example-en { font-size: 13px; color: var(--text2); line-height: 1.4; }
  .logic-box {
    background: var(--purple);
    background: linear-gradient(135deg, #a855f720, #6366f120);
    border: 1px solid #a855f740;
    border-radius: 10px; padding: 10px 14px;
    width: 100%; margin-top: 8px; font-size: 13px; text-align: center;
  }

  /* === RATING BUTTONS === */
  .rating-buttons {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .rate-btn {
    padding: 14px 4px; border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); color: var(--text); cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600;
    transition: all 0.15s; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .rate-btn .interval { font-size: 10px; color: var(--text2); font-weight: 400; }
  .rate-btn:hover { transform: translateY(-2px); }
  .rate-btn.again { border-color: var(--red); }
  .rate-btn.again:hover { background: var(--red-bg); }
  .rate-btn.hard { border-color: var(--orange); }
  .rate-btn.hard:hover { background: var(--orange-bg); }
  .rate-btn.good { border-color: var(--green); }
  .rate-btn.good:hover { background: var(--green-bg); }
  .rate-btn.easy { border-color: var(--blue); }
  .rate-btn.easy:hover { background: var(--blue-bg); }

  /* === QUIZ MODE === */
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .quiz-opt {
    padding: 16px; border: 2px solid var(--border); border-radius: 14px;
    background: var(--surface); cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 500; color: var(--text);
    transition: all 0.15s; text-align: center;
  }
  .quiz-opt:hover { border-color: var(--accent); background: var(--surface2); }
  .quiz-opt.correct { border-color: var(--green); background: var(--green-bg); }
  .quiz-opt.wrong { border-color: var(--red); background: var(--red-bg); }
  .quiz-prompt { text-align: center; margin-bottom: 20px; }
  .quiz-prompt .word { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  .quiz-prompt .hint { font-size: 13px; color: var(--text2); }

  /* === TYPE FILTER === */
  .type-filters {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .type-pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .type-pill.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* === BROWSE LIST === */
  .verb-list { display: flex; flex-direction: column; gap: 6px; }
  .verb-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; transition: all 0.15s;
  }
  .verb-row:hover { background: var(--surface2); border-color: var(--accent); }
  .verb-row .left { display: flex; flex-direction: column; gap: 2px; }
  .verb-row .fi { font-weight: 700; font-size: 15px; }
  .verb-row .en { font-size: 12px; color: var(--text2); }
  .verb-row .right { display: flex; align-items: center; gap: 8px; }
  .verb-row .type-tag {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 4px; background: var(--accent); color: white;
  }
  .mastery-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .mastery-dot.new { background: var(--blue); }
  .mastery-dot.learning { background: var(--orange); }
  .mastery-dot.review { background: var(--green); }
  .mastery-dot.mastered { background: var(--purple); }

  /* === SESSION COMPLETE === */
  .session-done {
    text-align: center; padding: 48px 20px;
  }
  .session-done .trophy { font-size: 64px; margin-bottom: 16px; }
  .session-done h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .session-done p { color: var(--text2); margin-bottom: 24px; }
  .session-done .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .session-done .mini-stat { background: var(--surface); border-radius: 12px; padding: 16px; }
  .session-done .mini-stat .n { font-size: 28px; font-weight: 800; }
  .session-done .mini-stat .l { font-size: 11px; color: var(--text2); }

  /* === BUTTONS === */
  .btn-primary {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: var(--accent); color: white; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary {
    width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface); color: var(--text); font-family: inherit;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    margin-top: 8px;
  }
  .btn-secondary:hover { background: var(--surface2); }

  /* === SETTINGS === */
  .settings-group {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
  }
  .settings-group h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .setting-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0;
  }
  .setting-row label { font-size: 13px; color: var(--text2); }
  .setting-row select, .setting-row input[type="number"] {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 8px;
    font-family: inherit; font-size: 13px;
  }

  .hidden { display: none !important; }

  /* Keyboard hint */
  .kb-hints {
    display: flex; justify-content: center; gap: 16px;
    font-size: 11px; color: var(--text2); opacity: 0.5; margin-top: 8px;
  }
  .kb-hints kbd {
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
    font-family: inherit; font-size: 10px; border: 1px solid var(--border);
  }

  /* === SOUND BUTTON === */
  .sound-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); cursor: pointer; font-size: 16px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .sound-btn:hover { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.1); }
  .sound-btn.playing { background: var(--accent); border-color: var(--accent); color: white; animation: pulse 0.6s ease infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.12); } }

  .sound-row {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 6px;
  }
  .sound-label { font-size: 11px; color: var(--text2); opacity: 0.6; }

  .sound-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 6px 12px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text2);
    transition: all 0.15s; font-family: inherit;
  }
  .sound-toggle.on { background: var(--accent); border-color: var(--accent); color: white; }

  .answer-flash {
    position: fixed; top: 0; left: 0; width: 100%; height: 4px;
    transition: opacity 0.4s;
  }
  .answer-flash.correct-flash { background: var(--green); }
  .answer-flash.wrong-flash { background: var(--red); }

  @media (max-width: 400px) {
    .verb-word { font-size: 28px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

<div class="app" id="app"></div>

// ========== SOUND ENGINE ==========
const Sound = {
  enabled: true,
  speaking: false,
  fiVoice: null,
  audioCtx: null,

  init() {
    // Try to find a Finnish voice, fallback to best available
    const loadVoices = () => {
      const voices = window.speechSynthesis.getVoices();
      this.fiVoice = voices.find(v => v.lang.startsWith('fi')) ||
                     voices.find(v => v.lang.startsWith('sv')) || // Swedish as fallback (similar phonetics)
                     voices.find(v => v.lang.startsWith('de')) || // German as fallback (similar sounds)
                     voices[0] || null;
    };
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  },

  getCtx() {
    if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return this.audioCtx;
  },

  speak(text, lang = 'fi-FI', rate = 0.85, onEnd = null) {
    if (!this.enabled) { if (onEnd) onEnd(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = rate;
    utt.pitch = 1.05;
    // Use Finnish voice if found
    const voices = window.speechSynthesis.getVoices();
    const fiV = voices.find(v => v.lang.startsWith('fi')) ||
                voices.find(v => v.lang.startsWith('sv')) ||
                voices.find(v => v.lang.startsWith('de'));
    if (fiV) utt.voice = fiV;

    this.speaking = true;
    utt.onend = () => { this.speaking = false; if (onEnd) onEnd(); };
    utt.onerror = () => { this.speaking = false; if (onEnd) onEnd(); };
    window.speechSynthesis.speak(utt);

    // Update button glow
    document.querySelectorAll('.sound-btn').forEach(b => b.classList.add('playing'));
    utt.onend = () => {
      this.speaking = false;
      document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('playing'));
      if (onEnd) onEnd();
    };
  },

  speakVerb(idx) {
    if (!this.enabled) return;
    const verb = VERBS[idx];
    this.speak(verb.v, 'fi-FI', 0.80);
  },

  speakExample(idx) {
    if (!this.enabled) return;
    const verb = VERBS[idx];
    // Speak verb first, then example after a pause
    this.speak(verb.v, 'fi-FI', 0.80, () => {
      setTimeout(() => this.speak(verb.ex[0], 'fi-FI', 0.85), 300);
    });
  },

  playTone(type) {
    // type: 'correct', 'wrong', 'flip', 'card'
    if (!this.enabled) return;
    try {
      const ctx = this.getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'correct') {
        osc.frequency.setValueAtTime(523, ctx.currentTime);   // C5
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.08); // E5
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.16); // G5
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.setValueAtTime(250, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.type = 'sawtooth';
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'flip') {
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'card') {
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.04, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.1);
      }
    } catch(e) {}
  },

  toggle() {
    this.enabled = !this.enabled;
    if (!this.enabled) window.speechSynthesis.cancel();
  }
};
Sound.init();

// ========== SM-2 SPACED REPETITION ENGINE ==========
class SRS {
  constructor() {
    this.data = {};
    this.load();
  }

  load() {
    try {
      const raw = window._srsData;
      if (raw) this.data = raw;
    } catch(e) {}
    // Initialize missing verbs
    VERBS.forEach((v, i) => {
      if (!this.data[i]) {
        this.data[i] = {
          ef: 2.5,        // easiness factor
          interval: 0,    // days until next review
          reps: 0,        // consecutive correct
          due: 0,         // timestamp when due
          lastReview: 0,  // last review timestamp
          status: 'new'   // new, learning, review, mastered
        };
      }
    });
  }

  save() {
    window._srsData = this.data;
  }

  getCard(i) { return this.data[i]; }

  rate(i, quality) {
    // quality: 0=again, 1=hard, 2=good, 3=easy
    const card = this.data[i];
    const now = Date.now();
    card.lastReview = now;

    if (quality === 0) {
      card.reps = 0;
      card.interval = 0;
      card.status = 'learning';
      card.due = now + 60000; // 1 min
    } else if (quality === 1) {
      card.reps = Math.max(1, card.reps);
      card.interval = Math.max(1, card.interval * 1.2);
      card.ef = Math.max(1.3, card.ef - 0.15);
      card.status = 'learning';
      card.due = now + card.interval * 60000 * (card.interval < 1 ? 1 : 60);
    } else if (quality === 2) {
      card.reps += 1;
      if (card.reps === 1) card.interval = 1;
      else if (card.reps === 2) card.interval = 6;
      else card.interval = Math.round(card.interval * card.ef);
      card.ef = Math.max(1.3, card.ef + 0.1);
      card.status = card.interval > 21 ? 'mastered' : 'review';
      card.due = now + card.interval * 86400000;
    } else { // easy
      card.reps += 1;
      if (card.reps <= 2) card.interval = 4;
      else card.interval = Math.round(card.interval * card.ef * 1.3);
      card.ef = Math.max(1.3, card.ef + 0.15);
      card.status = card.interval > 14 ? 'mastered' : 'review';
      card.due = now + card.interval * 86400000;
    }

    this.save();
  }

  getDueCards(typeFilter) {
    const now = Date.now();
    let indices = [];
    VERBS.forEach((v, i) => {
      if (typeFilter && typeFilter !== 'all' && v.t !== typeFilter) return;
      const c = this.data[i];
      if (c.status === 'new' || c.due <= now) indices.push(i);
    });
    // Sort: learning first, then new, then review
    indices.sort((a, b) => {
      const ca = this.data[a], cb = this.data[b];
      const order = {learning: 0, new: 1, review: 2, mastered: 3};
      return (order[ca.status] || 0) - (order[cb.status] || 0);
    });
    return indices;
  }

  getStats() {
    let n = 0, l = 0, r = 0, m = 0;
    Object.values(this.data).forEach(c => {
      if (c.status === 'new') n++;
      else if (c.status === 'learning') l++;
      else if (c.status === 'review') r++;
      else if (c.status === 'mastered') m++;
    });
    return {new: n, learning: l, review: r, mastered: m, total: VERBS.length};
  }

  getIntervalText(i, quality) {
    const card = {...this.data[i]};
    if (quality === 0) return '1m';
    if (quality === 1) {
      const iv = Math.max(1, card.interval * 1.2);
      return iv < 1 ? '1m' : iv < 60 ? Math.round(iv)+'m' : Math.round(iv/60)+'h';
    }
    if (quality === 2) {
      let iv;
      if (card.reps === 0) iv = 1;
      else if (card.reps === 1) iv = 6;
      else iv = Math.round(card.interval * card.ef);
      return iv + 'd';
    }
    // easy
    let iv;
    if (card.reps <= 1) iv = 4;
    else iv = Math.round(card.interval * card.ef * 1.3);
    return iv + 'd';
  }

  resetAll() {
    this.data = {};
    this.load();
    this.save();
  }
}

const srs = new SRS();
let state = {
  view: 'learn',        // learn, quiz, browse, settings
  queue: [],
  queueIdx: 0,
  flipped: false,
  typeFilter: 'all',
  newPerSession: 15,
  quizAnswered: false,
  quizCorrect: null,
  sessionStats: {reviewed: 0, correct: 0, newLearned: 0},
  sessionDone: false,
  soundEnabled: true,
};

function buildQueue() {
  const due = srs.getDueCards(state.typeFilter === 'all' ? null : state.typeFilter);
  let newCount = 0;
  state.queue = [];
  for (const i of due) {
    const c = srs.getCard(i);
    if (c.status === 'new') {
      if (newCount < state.newPerSession) {
        state.queue.push(i);
        newCount++;
      }
    } else {
      state.queue.push(i);
    }
  }
  state.queueIdx = 0;
  state.flipped = false;
  state.sessionDone = false;
  state.sessionStats = {reviewed: 0, correct: 0, newLearned: 0};
}

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  const stats = srs.getStats();
  const currentCard = state.queue[state.queueIdx];
  const remaining = state.queue.length - state.queueIdx;

  let html = `
    <div class="header">
      <div class="logo">Suomi<span>Verbi</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="sound-toggle ${Sound.enabled ? 'on' : ''}" onclick="toggleSound()" title="Toggle sound">
          ${Sound.enabled ? '🔊' : '🔇'}
        </button>
        <div class="streak-badge"><span class="fire">🔥</span> ${stats.mastered} mastered</div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-card new"><div class="num">${stats.new}</div><div class="label">New</div></div>
      <div class="stat-card learning"><div class="num">${stats.learning}</div><div class="label">Learning</div></div>
      <div class="stat-card review"><div class="num">${stats.review}</div><div class="label">Review</div></div>
      <div class="stat-card mastered"><div class="num">${stats.mastered}</div><div class="label">Mastered</div></div>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span>Progress</span>
        <span>${Math.round((stats.mastered + stats.review) / stats.total * 100)}% learned</span>
      </div>
      <div class="progress-bar">
        <div class="seg mastered" style="width:${stats.mastered/stats.total*100}%"></div>
        <div class="seg review" style="width:${stats.review/stats.total*100}%"></div>
        <div class="seg learning" style="width:${stats.learning/stats.total*100}%"></div>
      </div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab ${state.view==='learn'?'active':''}" onclick="switchView('learn')">📚 Learn</button>
      <button class="nav-tab ${state.view==='quiz'?'active':''}" onclick="switchView('quiz')">⚡ Quiz</button>
      <button class="nav-tab ${state.view==='browse'?'active':''}" onclick="switchView('browse')">📖 Browse</button>
      <button class="nav-tab ${state.view==='settings'?'active':''}" onclick="switchView('settings')">⚙️</button>
    </div>
  `;

  if (state.view === 'learn') {
    if (state.sessionDone || currentCard === undefined) {
      html += renderSessionDone();
    } else {
      html += renderLearnCard(currentCard, remaining);
    }
  } else if (state.view === 'quiz') {
    html += renderQuiz();
  } else if (state.view === 'browse') {
    html += renderBrowse();
  } else if (state.view === 'settings') {
    html += renderSettings();
  }

  app.innerHTML = html;
}

          Hard<span class="interval">${srs.getIntervalText(idx, 1)}</span>
        </button>
        <button class="rate-btn good" onclick="rateCard(2)">
          Good<span class="interval">${srs.getIntervalText(idx, 2)}</span>
        </button>
        <button class="rate-btn easy" onclick="rateCard(3)">
          Easy<span class="interval">${srs.getIntervalText(idx, 3)}</span>
        </button>
      </div>
      <div class="kb-hints">
        <span><kbd>1</kbd> Again</span>
        <span><kbd>2</kbd> Hard</span>
        <span><kbd>3</kbd> Good</span>
        <span><kbd>4</kbd> Easy</span>
      </div>
    `;
  } else {
    html += `
      <div class="kb-hints"><span><kbd>Space</kbd> or tap to flip</span></div>
    `;
  }

  return html;
}

function renderSessionDone() {
  const s = state.sessionStats;
  const accuracy = s.reviewed > 0 ? Math.round(s.correct / s.reviewed * 100) : 0;
  return `
    <div class="session-done">
      <div class="trophy">🎉</div>
      <h2>Session Complete!</h2>
      <p>Great work! Come back later for your next review.</p>
      <div class="stats">
        <div class="mini-stat"><div class="n">${s.reviewed}</div><div class="l">Reviewed</div></div>
        <div class="mini-stat"><div class="n">${accuracy}%</div><div class="l">Accuracy</div></div>
        <div class="mini-stat"><div class="n">${s.newLearned}</div><div class="l">New Words</div></div>
      </div>
      <button class="btn-primary" onclick="startNewSession()">Start New Session</button>
    </div>
  `;
}

function renderQuiz() {
  // Pick 4 random verbs for a multiple choice quiz
  if (!state.quizVerb && state.quizVerb !== 0) pickQuizQuestion();
  const idx = state.quizVerb;
  if (idx === null || idx === undefined) {
    return `<div class="session-done"><div class="trophy">📚</div><h2>No verbs to quiz</h2><p>Start learning first!</p></div>`;
  }
  const verb = VERBS[idx];
  const opts = state.quizOptions || [];

  const quizWord = state.quizDirection === 'fi2en' ? verb.v : verb.e;
  const quizLang = state.quizDirection === 'fi2en' ? 'fi-FI' : 'en-US';

  let html = `
    <div id="answer-flash" class="answer-flash" style="opacity:0;"></div>
    <div class="quiz-prompt">
      <div class="sound-row">
        <div class="word">${quizWord}</div>
        ${state.quizDirection === 'fi2en' ? `<button class="sound-btn" onclick="Sound.speak('${verb.v.replace(/'/g,"\\'")}','fi-FI',0.80)" title="Pronounce">🔊</button>` : ''}
      </div>
      <div class="hint">${state.quizDirection === 'fi2en' ? 'What does this mean?' : 'Mikä on suomeksi?'}</div>
    </div>
    <div class="quiz-options">
  `;

  opts.forEach((oi, j) => {
    const optVerb = VERBS[oi];
    const display = state.quizDirection === 'fi2en' ? optVerb.e : optVerb.v;
    let cls = 'quiz-opt';
    if (state.quizAnswered) {
      if (oi === idx) cls += ' correct';
      else if (j === state.quizPicked && oi !== idx) cls += ' wrong';
    }
    html += `<button class="${cls}" ${state.quizAnswered ? '' : `onclick="answerQuiz(${j})"`}>${display}</button>`;
  });

  html += `</div>`;

  if (state.quizAnswered) {
    const verb2 = VERBS[idx];
    html += `
      <div class="example-box" style="margin-bottom:16px;">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="flex:1;">
            <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:${state.quizCorrect ? 'var(--green)' : 'var(--red)'};">${state.quizCorrect ? '✓ Correct!' : '✗ Incorrect'} — ${verb2.v} = ${verb2.e}</div>
            <div class="example-fi">${verb2.ex[0]}</div>
            <div class="example-en">${verb2.ex[1]}</div>
          </div>
          <button class="sound-btn" onclick="Sound.speakExample(${idx})" title="Hear pronunciation + example">🔊</button>
        </div>
      </div>
      <button class="btn-primary" onclick="nextQuiz()">Next Question →</button>
    `;
  }

  return html;
}

function renderBrowse() {
  let html = `
    <div class="type-filters">
      <button class="type-pill ${state.typeFilter==='all'?'active':''}" onclick="setTypeFilter('all')">All</button>
      ${[1,2,3,4,5,6].map(t => `<button class="type-pill ${state.typeFilter===t?'active':''}" onclick="setTypeFilter(${t})">Type ${t}</button>`).join('')}
    </div>
    <div class="verb-list">
  `;

  VERBS.forEach((v, i) => {
    if (state.typeFilter !== 'all' && v.t !== state.typeFilter) return;
    const c = srs.getCard(i);
    html += `
      <div class="verb-row" onclick="learnSpecific(${i})">
        <div class="left">
          <div class="fi">${v.v}</div>
          <div class="en">${v.e}</div>
        </div>
        <div class="right">
          <button class="sound-btn" onclick="event.stopPropagation();Sound.speakVerb(${i})" title="Pronounce" style="width:28px;height:28px;font-size:13px;">🔊</button>
          <div class="type-tag">T${v.t}</div>
          <div class="mastery-dot ${c.status}"></div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function renderSettings() {
  return `
    <div class="settings-group">
      <h3>Session Settings</h3>
      <div class="setting-row">
        <label>New cards per session</label>
        <input type="number" value="${state.newPerSession}" min="5" max="50" step="5" onchange="state.newPerSession=+this.value;buildQueue();render()">
      </div>
      <div class="setting-row">
        <label>Filter by type</label>
        <select onchange="state.typeFilter=this.value==='all'?'all':+this.value;buildQueue();render()">
          <option value="all" ${state.typeFilter==='all'?'selected':''}>All Types</option>
          ${[1,2,3,4,5,6].map(t => `<option value="${t}" ${state.typeFilter===t?'selected':''}>Type ${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="settings-group">
      <h3>🔊 Sound Settings</h3>
      <div class="setting-row">
        <label>Sound & Pronunciation</label>
        <button class="sound-toggle ${Sound.enabled ? 'on' : ''}" onclick="toggleSound();render()" style="padding:6px 14px;border-radius:8px;width:auto;">
          ${Sound.enabled ? '🔊 On' : '🔇 Off'}
        </button>
      </div>
      <div class="setting-row">
        <label>Test pronunciation</label>
        <button class="sound-btn" onclick="Sound.speak('Minä rakastan suomea!','fi-FI',0.85)" title="Test voice">🔊</button>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-top:8px;line-height:1.5;">
        Uses your device's Finnish voice (fi-FI) for authentic pronunciation. If no Finnish voice is installed, a similar language voice is used as fallback. Install a Finnish voice in your OS settings for best results.
      </p>
    </div>
    <div class="settings-group">
      <h3>About the Algorithm</h3>
      <p style="font-size:13px;color:var(--text2);line-height:1.6;">
        This app uses <strong style="color:var(--text)">SM-2 Spaced Repetition</strong>, the same algorithm that powers Anki.
        Cards you find easy are shown less frequently. Cards you struggle with are repeated sooner.
        This optimizes your review schedule for maximum long-term retention with minimum time spent.
      </p>
    </div>
    <div class="settings-group">
      <h3>Verb Types Quick Reference</h3>
      <p style="font-size:13px;color:var(--text2);line-height:1.8;">
        <strong style="color:var(--accent2)">Type 1</strong> — ends in -aa/-ää (puhua, lukea)<br>
        <strong style="color:var(--accent2)">Type 2</strong> — ends in -da/-dä (syödä, juoda)<br>
        <strong style="color:var(--accent2)">Type 3</strong> — ends in -lla/-llä, -nna/-nnä, -sta/-stä (mennä, tulla)<br>
        <strong style="color:var(--accent2)">Type 4</strong> — ends in -ata/-ätä, -ota/-ötä (haluta, pelata)<br>
        <strong style="color:var(--accent2)">Type 5</strong> — ends in -ita/-itä (tarvita, valita)<br>
        <strong style="color:var(--accent2)">Type 6</strong> — ends in -eta/-etä (suureta, vanheta)
      </p>
    </div>
    <button class="btn-secondary" style="border-color:var(--red);color:var(--red);" onclick="if(confirm('Reset all progress?')){srs.resetAll();buildQueue();render();}">
      Reset All Progress
    </button>
  `;
}

// ========== ACTIONS ==========
function switchView(v) {
  state.view = v;
  if (v === 'learn') {
    buildQueue();
    render();
    const first = state.queue[0];
    if (first !== undefined) setTimeout(() => Sound.speakVerb(first), 400);
    return;
  }
  if (v === 'quiz') {
    state.quizVerb = null;
    pickQuizQuestion();
    render();
    if (state.quizVerb !== null && state.quizDirection === 'fi2en') {
      setTimeout(() => Sound.speakVerb(state.quizVerb), 400);
    }
    return;
  }
  render();
}

function flipCard() {
  if (!state.flipped) {
    state.flipped = true;
    Sound.playTone('flip');
    render();
    // Auto-speak example on flip
    const idx = state.queue[state.queueIdx];
    if (idx !== undefined) setTimeout(() => Sound.speakExample(idx), 150);
  }
}

function rateCard(quality) {
  const idx = state.queue[state.queueIdx];
  const card = srs.getCard(idx);
  const wasNew = card.status === 'new';

  srs.rate(idx, quality);

  state.sessionStats.reviewed++;
  if (quality >= 2) state.sessionStats.correct++;
  if (wasNew) state.sessionStats.newLearned++;

  // If "again", re-insert card later in queue
  if (quality === 0) {
    const reinsert = Math.min(state.queueIdx + 3 + Math.floor(Math.random()*3), state.queue.length);
    state.queue.splice(reinsert, 0, idx);
  }

  state.queueIdx++;
  state.flipped = false;

  if (state.queueIdx >= state.queue.length) {
    state.sessionDone = true;
  }

  render();
  // Auto-speak next verb
  const nextIdx = state.queue[state.queueIdx];
  if (nextIdx !== undefined && !state.sessionDone) {
    setTimeout(() => Sound.speakVerb(nextIdx), 200);
  }
}

function startNewSession() {
  buildQueue();
  render();
  const first = state.queue[0];
  if (first !== undefined) setTimeout(() => Sound.speakVerb(first), 400);
}

function pickQuizQuestion() {
  // Pick from non-new verbs if possible, otherwise any
  let pool = [];
  VERBS.forEach((v, i) => {
    const c = srs.getCard(i);
    if (state.typeFilter !== 'all' && v.t !== state.typeFilter) return;
    if (c.status !== 'new') pool.push(i);
  });
  if (pool.length < 4) {
    pool = [];
    VERBS.forEach((v, i) => {
      if (state.typeFilter !== 'all' && v.t !== state.typeFilter) return;
      pool.push(i);
    });
  }
  if (pool.length < 4) { state.quizVerb = null; return; }

  // Shuffle and pick
  const shuffled = pool.sort(() => Math.random() - 0.5);
  state.quizVerb = shuffled[0];
  state.quizOptions = shuffled.slice(0, 4).sort(() => Math.random() - 0.5);
  state.quizDirection = Math.random() > 0.5 ? 'fi2en' : 'en2fi';
  state.quizAnswered = false;
  state.quizPicked = null;
  state.quizCorrect = null;
}

function answerQuiz(j) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  state.quizPicked = j;
  const picked = state.quizOptions[j];
  state.quizCorrect = picked === state.quizVerb;

  // Update SRS based on quiz answer
  if (state.quizCorrect) {
    srs.rate(state.quizVerb, 2); // good
    Sound.playTone('correct');
  } else {
    srs.rate(state.quizVerb, 0); // again
    Sound.playTone('wrong');
  }

  render();

  // Flash the top bar and auto-speak correct answer
  const flash = document.getElementById('answer-flash');
  if (flash) {
    flash.className = 'answer-flash ' + (state.quizCorrect ? 'correct-flash' : 'wrong-flash');
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 600);
  }
  // Speak the correct Finnish verb after a short delay
  setTimeout(() => Sound.speakExample(state.quizVerb), 400);
}

function nextQuiz() {
  pickQuizQuestion();
  render();
  // Auto-speak the new quiz word if Finnish direction
  if (state.quizVerb !== null && state.quizDirection === 'fi2en') {
    setTimeout(() => Sound.speakVerb(state.quizVerb), 300);
  }
}

function toggleSound() {
  Sound.toggle();
  state.soundEnabled = Sound.enabled;
  render();
}

function setTypeFilter(t) {
  state.typeFilter = t;
  if (state.view === 'browse') {
    render();
  } else {
    buildQueue();
    render();
  }
}

function learnSpecific(i) {
  state.view = 'learn';
  state.queue = [i];
  state.queueIdx = 0;
  state.flipped = false;
  state.sessionDone = false;
  render();
  setTimeout(() => Sound.speakVerb(i), 300);
}

// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', (e) => {
  if (state.view === 'learn' && !state.sessionDone) {
    if (e.code === 'Space' && !state.flipped) {
      e.preventDefault();
      flipCard();
    } else if (state.flipped) {
      if (e.key === '1') rateCard(0);
      else if (e.key === '2') rateCard(1);
      else if (e.key === '3') rateCard(2);
      else if (e.key === '4') rateCard(3);
    }
  }
});

// ========== INIT ==========
buildQueue();
render();
// Auto-speak first card after a brief delay (voices need to load)
setTimeout(() => {
  const first = state.queue[0];
  if (first !== undefined) Sound.speakVerb(first);
}, 1000);
</script>
</body>
</html>
